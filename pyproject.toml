[tool.ruff]
# Avoid stray workshop trees and local artifacts (CI runs `ruff check .`).
exclude = [
  "tmp",
  "docs/tmp",
  ".venv",
  "venv",
  "instance",
  "uploads",
]

[tool.ruff.lint]
# Keep the CI contract stable across Ruff releases instead of inheriting
# version-dependent defaults.
select = ["E4", "E7", "E9", "F"]
ignore = ["E402", "F401", "F841"]
